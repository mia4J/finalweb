<section class="loginpage">
  <div class="overlay">
    <div class="logincontainer">
      <h2>Welcome Back!</h2>
      <p>Login to continue Exploring Camanlangan</p>

      <form (ngSubmit)="login()">
        <input
          type="text"
          placeholder="Username"
          [(ngModel)]="username"
          name="username"
          required
        >

        <div class="passwordbox">
          <input
            type="password"
            placeholder="Password"
            [(ngModel)]="password"
            name="password"
            required
          >
        </div>

        <button type="submit">Login</button>
      </form>

      <p class="error" *ngIf="errorMessage">
        {{ errorMessage }}
      </p>

      <p class="registerlink">
        Don't have an account?
        <a routerLink="/register">Sign Up</a>
      </p>
    </div>
  </div>
</section>
